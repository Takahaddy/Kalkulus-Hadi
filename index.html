<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Digital</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .calculator {
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 250px;
        }

        .display {
            width: 100%;
            height: 50px;
            font-size: 24px;
            text-align: right;
            margin-bottom: 15px;
            padding-right: 10px;
            box-sizing: border-box;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
        }

        button:hover {
            background-color: #dddddd;
        }
    </style>
</head>

<body>

<div class="calculator">
    <input type="text" class="display" id="display" readonly>

    <div class="buttons">
        <button onclick="clearDisplay()">C</button>
        <button onclick="hapus()">⌫</button>
        <button onclick="tambah('/')">/</button>
        <button onclick="tambah('*')">×</button>

        <button onclick="tambah('7')">7</button>
        <button onclick="tambah('8')">8</button>
        <button onclick="tambah('9')">9</button>
        <button onclick="tambah('-')">−</button>

        <button onclick="tambah('4')">4</button>
        <button onclick="tambah('5')">5</button>
        <button onclick="tambah('6')">6</button>
        <button onclick="tambah('+')">+</button>

        <button onclick="tambah('1')">1</button>
        <button onclick="tambah('2')">2</button>
        <button onclick="tambah('3')">3</button>
        <button onclick="hitung()">=</button>

        <button onclick="tambah('0')">0</button>
        <button onclick="tambah('.')">.</button>
    </div>
</div>

<script>
    function tambah(nilai) {
        document.getElementById("display").value += nilai;
    }

    function clearDisplay() {
        document.getElementById("display").value = "";
    }

    function hapus() {
        let display = document.getElementById("display");
        display.value = display.value.slice(0, -1);
    }

    function hitung() {
        let display = document.getElementById("display");

        try {
            display.value = eval(display.value);
        } catch {
            alert("Perhitungan tidak valid");
        }
    }
</script>

</body>
</html>
